<body>
<a class="skip-link" href="#main">本文へスキップ</a>

<nav class="nav">
  <div class="container nav__inner">
    <a class="nav__brand" data-site-brand href="/">Media Canvas</a>

    <div class="nav__links">

    </div>
  </div>

<main id="main">
  <section class="section section--hero">
    <div class="container stack stack--lg" data-collection-page>
      <div class="card stack center" data-collection-not-found hidden>
        <h1 class="h1">特集が見つかりません</h1>
        <p class="muted">特集 slug または公開状態を確認してください。</p>
        <div class="cluster">
          <a class="btn btn--primary" href="/collections/">特集一覧へ戻る</a>
          <a class="btn btn--secondary" href="/finder/">作品検索へ</a>
        </div>
      </div>

      <div class="stack stack--lg" data-collection-content>
        <div class="hero-panel stack">
          <p class="kicker">Collection Detail</p>
          <h1 class="h1" data-collection-title>特集名</h1>
          <p class="lead" data-collection-description>特集の説明</p>
          <div class="tag-list" data-collection-tags></div>
        </div>

        <div class="grid">
          <div class="card stack">
            <h2 class="h2">この特集の意図</h2>
            <p class="muted" data-collection-lead></p>
          </div>
          <div class="card stack">
            <h2 class="h2">この特集で探す</h2>
            <p class="muted">特集の中からさらに絞り込みたい場合は、検索ページへ戻って条件を追加します。</p>
            <div class="cluster">
              <a class="btn btn--primary" data-collection-finder-link href="/finder/">この特集で検索する</a>
            </div>
          </div>
        </div>

        <div class="card stack">
          <h2 class="h2">見方のポイント</h2>
          <ul class="list" data-collection-points></ul>
        </div>

        <div class="stack">
          <h2 class="h2">この特集に含まれる作品</h2>
          <div class="grid" data-collection-works></div>
        </div>

        <div class="card stack">
          <h2 class="h2">ほかの特集へ</h2>
          <div class="tag-list" data-collection-related></div>
        </div>
      </div>
    </div>
  </section>
</main>
