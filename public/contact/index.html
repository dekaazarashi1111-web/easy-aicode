<body>
<a class="skip-link" href="#main">本文へスキップ</a>

<nav class="nav"></nav>

<main id="main">
  <section class="section section--tight contact-simple-page">
    <div class="container">
      <div class="contact-simple-shell">
        <div class="contact-simple-card">
          <header class="contact-simple-header">
            <span class="contact-simple-header__icon" aria-hidden="true">問</span>
            <div class="contact-simple-header__body">
              <p class="contact-simple-header__eyebrow">Contact</p>
              <h1 class="h2">フォームによるお問い合わせ</h1>
              <p class="muted">掲載修正、権利関係、運営連絡を受けるための窓口ページです。</p>
            </div>
          </header>

          <form class="contact-simple-form" data-contact-form>
            <label class="contact-simple-form__field">
              <span>種別</span>
              <select name="kind" required>
                <option value="" selected disabled>選択してください</option>
                <option value="掲載修正について">掲載修正について</option>
                <option value="権利関係・削除依頼">権利関係・削除依頼</option>
                <option value="運営への連絡">運営への連絡</option>
              </select>
            </label>

            <label class="contact-simple-form__field">
              <span>お名前</span>
              <input type="text" name="name" placeholder="お名前を入力してください" autocomplete="name" required />
            </label>

            <label class="contact-simple-form__field">
              <span>メールアドレス</span>
              <input type="email" name="email" placeholder="you@example.com" autocomplete="email" required />
            </label>

            <label class="contact-simple-form__field">
              <span>本文</span>
              <textarea name="message" placeholder="内容を入力してください" required></textarea>
            </label>

            <button class="contact-simple-submit" type="submit" data-contact-submit disabled>送信する</button>
            <p class="contact-simple-form__status" data-contact-status hidden aria-live="polite"></p>
          </form>
        </div>

        <nav class="contact-simple-links" aria-label="関連ページ">
          <a href="/privacy">プライバシー</a>
          <a href="/disclaimer">免責事項</a>
        </nav>
      </div>
    </div>
  </section>
</main>

<footer class="footer"></footer>
</body>
</html>
